<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <title>TG Coin — кликер</title>
  <style>
    :root { font-family: Inter, Roboto, "Segoe UI", Arial, sans-serif; color: #30343b; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 20px; background: #edf1f5; user-select: none; }
    .game { width: min(100%, 420px); height: min(800px, calc(100vh - 40px)); min-height: 640px; display: flex; flex-direction: column; overflow: hidden; background: #fff; box-shadow: 0 20px 50px rgba(43, 63, 82, .18); }
    header { padding: 14px 16px 0; border-bottom: 1px solid #f0f1f3; }
    .status { display: flex; justify-content: space-between; color: #20242a; font-size: 11px; font-weight: 700; }
    .status-icons { letter-spacing: 2px; }
    .top-row { padding: 23px 0 15px; text-align: center; }
    .account-label { color: #9ca3ad; font-size: 10px; font-weight: 800; letter-spacing: .45px; text-transform: uppercase; }
    .balance { margin-top: 3px; color: #24282f; font-size: 36px; font-weight: 500; line-height: 1.1; font-variant-numeric: tabular-nums; }
    .balance::after { content: " TG"; display: inline-grid; place-items: center; width: 25px; height: 25px; margin-left: 5px; border: 2px solid #333840; border-radius: 50%; vertical-align: 5px; font-size: 8px; font-weight: 900; }
    .per-second { margin-top: 5px; color: #4b91bd; font-size: 12px; font-weight: 700; }
    .energy-row { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 0 0 12px; color: #8e98a5; font-size: 11px; }
    .energy-track { width: 108px; height: 5px; overflow: hidden; border-radius: 9px; background: #e3e7ec; }
    .energy-fill { height: 100%; border-radius: inherit; background: #4d9add; transition: width .12s linear; }
    nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 11px; padding: 15px 16px 13px; border-bottom: 1px solid #f1f2f4; }
    .tab { display: grid; place-items: center; gap: 5px; min-height: 67px; border: 0; border-radius: 11px; color: #fff; cursor: pointer; font: inherit; font-size: 11px; font-weight: 600; box-shadow: 0 3px 7px rgba(54,82,114,.2); transition: transform .15s; }
    .tab:active { transform: scale(.96); }
    .tab:nth-child(1) { background: linear-gradient(145deg,#ff9a74,#ff6b55); }
    .tab:nth-child(2) { background: linear-gradient(145deg,#a062f3,#7134d9); }
    .tab:nth-child(3) { background: linear-gradient(145deg,#ff72bf,#e63198); }
    .tab .icon { font-size: 26px; line-height: 1; filter: brightness(0) invert(1); }
    .tab.active { box-shadow: 0 0 0 3px rgba(71,149,217,.22), 0 4px 9px rgba(54,82,114,.25); }
    main { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .screen { display: none; flex: 1; min-height: 0; }
    .screen.active { display: flex; }
    .home { flex-direction: column; overflow: hidden; }
    .section-title { margin: 17px 16px 10px; color: #a1a7b0; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .auto-list { display: flex; gap: 9px; overflow-x: auto; padding: 0 16px 15px; scrollbar-width: none; }
    .auto-list::-webkit-scrollbar { display: none; }
    .mini-upgrade { flex: 0 0 164px; display: grid; grid-template-columns: 35px 1fr; align-items: center; gap: 8px; padding: 9px; border: 1px solid #eef0f2; border-radius: 10px; box-shadow: 0 2px 6px rgba(36,56,76,.05); }
    .mini-icon { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 7px; background: #f7f9fb; color: #5d9c8a; font-size: 20px; }
    .mini-upgrade b { display: block; overflow: hidden; color: #535963; font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
    .mini-upgrade span { display: block; margin-top: 3px; color: #9ba2aa; font-size: 10px; }
    .coin-zone { position: relative; flex: 1; display: grid; place-items: start center; padding-top: 20px; background: linear-gradient(#fff 0%, #f9fbff 100%); }
    .online { position: absolute; top: 28px; z-index: 2; padding: 5px 10px; border-radius: 20px; background: rgba(64,122,216,.17); color: #4e8cce; font-size: 10px; font-weight: 700; }
    .coin-wrap { position: relative; display: grid; place-items: center; width: 285px; height: 285px; margin-top: 30px; }
    .coin { position: relative; width: 245px; height: 245px; border: 0; border-radius: 50%; cursor: pointer; background: radial-gradient(circle at 36% 27%,#86baff 0 5%,#6098f2 34%,#3777dd 73%,#2454bc 100%); box-shadow: inset 0 0 0 9px rgba(143,190,255,.48), inset 0 0 0 15px rgba(38,101,204,.32), 0 15px 25px rgba(50,105,197,.27); transition: transform .1s ease, filter .1s ease; }
    .coin::before { content: ""; position: absolute; inset: 38px; border: 2px solid rgba(186,218,255,.6); border-radius: 50%; }
    .coin span { position: relative; color: rgba(223,239,255,.85); font-size: 42px; font-weight: 900; letter-spacing: -2px; text-shadow: 0 2px 0 rgba(35,87,172,.5); }
    .coin small { position: absolute; top: 72px; left: 50%; transform: translateX(-50%); color: rgba(224,239,255,.8); font-size: 10px; font-weight: 700; white-space: nowrap; }
    .coin:active, .coin.pressed { transform: scale(.9); }
    .coin.empty { animation: empty .28s linear; }
    @keyframes empty { 25%,75% { filter: hue-rotate(310deg) saturate(2); transform: translateX(-5px); } 50% { transform: translateX(5px); } }
    .float { position: absolute; z-index: 3; pointer-events: none; color: #3c82e2; font-size: 24px; font-weight: 900; text-shadow: 0 2px 4px #fff; animation: rise .8s ease-out forwards; }
    @keyframes rise { from { opacity: 1; transform: translate(-50%,0) scale(.9); } to { opacity: 0; transform: translate(-50%,-78px) scale(1.12); } }
    .shop { flex-direction: column; overflow-y: auto; padding: 10px 16px 20px; background: #fff; }
    .shop-title { margin: 2px 0 8px; color: #30343b; font-size: 17px; }
    #upgrades { display: grid; gap: 2px; }
    .upgrade { display: grid; grid-template-columns: 45px 1fr auto; align-items: center; gap: 10px; padding: 13px 3px; border-bottom: 1px solid #edf0f2; }
    .upgrade::before { display: grid; place-items: center; width: 42px; height: 42px; border: 1px solid #edf0f2; border-radius: 7px; background: #fafbfd; content: "⚡"; color: #5994d1; font-size: 23px; }
    .upgrade:nth-child(2)::before { content: "🖱"; } .upgrade:nth-child(3)::before { content: "🔋"; } .upgrade:nth-child(4)::before { content: "↻"; }
    .upgrade h3 { margin: 0 0 3px; color: #4a5058; font-size: 12px; }
    .upgrade p { margin: 0; color: #87909a; font-size: 10px; line-height: 1.35; }
    .level { margin-top: 4px; color: #4e96c7; font-size: 10px; font-weight: 700; }
    .buy { min-width: 91px; padding: 7px 7px; border: 0; border-radius: 15px; background: #4789bf; color: #fff; cursor: pointer; font: inherit; font-size: 10px; font-weight: 700; transition: background .15s, transform .15s; }
    .buy:active { transform: scale(.95); } .buy:disabled { background: #c6cdd4; color: #fff; cursor: not-allowed; } .buy.success { background: #53b273; }
    .placeholder { align-items: center; justify-content: center; color: #9aa2ac; font-size: 15px; text-align: center; padding: 30px; }
    @media (max-width: 480px) { body { display: block; padding: 0; } .game { width: 100%; height: 100vh; min-height: 600px; } }
  </style>
</head>
<body>
  <section class="game" aria-label="Игра TG Coin">
    <header>
      <div class="status"><span>▮▮▮ ◉</span><span>12:30</span><span class="status-icons">◉ ▰</span></div>
      <div class="top-row"><div class="account-label">Ваш счёт · TG COIN</div><div class="balance" id="balance">0</div><div class="per-second" id="perSecond">+0 TG/сек</div></div>
      <div class="energy-row"><span>Энергия: <b id="energyText">100/100</b></span><div class="energy-track"><div class="energy-fill" id="energyFill"></div></div></div>
    </header>
    <nav aria-label="Навигация">
      <button class="tab active" data-tab="home"><span class="icon">☆</span>ТОП TG COIN</button>
      <button class="tab" data-tab="rating"><span class="icon">⇄</span>ПЕРЕВЕСТИ</button>
      <button class="tab" data-tab="shop"><span class="icon">♧</span>УСКОРЕНИЯ</button>
    </nav>
    <main>
      <section class="screen home active" data-screen="home">
        <div class="section-title">Автоматически · TG COIN</div>
        <div class="auto-list" id="autoList"></div>
        <div class="coin-zone"><div class="online">онлайн TG COIN</div><div class="coin-wrap" id="coinWrap"><button class="coin" id="coin" aria-label="Получить TG Coin"><small>НАЖМИТЕ</small><span>TG<br>COIN</span></button></div></div>
      </section>
      <section class="screen shop" data-screen="shop"><h2 class="shop-title">Ускорения TG COIN</h2><div id="upgrades"></div></section>
      <section class="screen placeholder" data-screen="rating">Переводы TG COIN скоро будут доступны</section>
    </main>
  </section>
  <script>
    (() => {
      "use strict";
      const KEY = "tgCoinGameState";
      const definitions = [
        { id: "click", name: "Усилитель клика", description: "Увеличивает доход от каждого нажатия на +1.", cost: level => Math.ceil(10 * 1.5 ** level) },
        { id: "auto", name: "Автоклик", description: "Даёт +1 монету в секунду за каждый уровень.", cost: level => Math.ceil(50 * 1.5 ** level) },
        { id: "tank", name: "Бак энергии", description: "Увеличивает максимальную энергию на 50.", cost: level => 100 * (level + 1) },
        { id: "recovery", name: "Скорость восстановления", description: "Увеличивает восстановление энергии на 0,5/сек.", cost: level => 75 * (level + 1) }
      ];
      const initial = () => ({ coins: 0, energy: 100, upgrades: { click: 0, auto: 0, tank: 0, recovery: 0 }, autoCarry: 0, lastSeen: Date.now() });
      let state;
      try {
        const saved = JSON.parse(localStorage.getItem(KEY));
        state = saved && saved.upgrades ? { ...initial(), ...saved, upgrades: { ...initial().upgrades, ...saved.upgrades } } : initial();
      } catch { state = initial(); }
      const maxEnergy = () => 100 + 50 * state.upgrades.tank;
      const recoveryRate = () => 1 + .5 * state.upgrades.recovery;
      const clickIncome = () => 1 + state.upgrades.click;
      const applyElapsed = (ms) => {
        const seconds = Math.max(0, ms / 1000);
        state.energy = Math.min(maxEnergy(), state.energy + seconds * recoveryRate());
        const passive = state.autoCarry + seconds * state.upgrades.auto;
        const earned = Math.floor(passive);
        state.coins += earned;
        state.autoCarry = passive - earned;
      };
      applyElapsed(Date.now() - state.lastSeen);
      let lastTick = Date.now();
      const $ = selector => document.querySelector(selector);
      const balance = $("#balance"), perSecond = $("#perSecond"), energyText = $("#energyText"), energyFill = $("#energyFill"), coin = $("#coin"), coinWrap = $("#coinWrap"), upgrades = $("#upgrades"), autoList = $("#autoList");
      const save = () => { state.lastSeen = Date.now(); localStorage.setItem(KEY, JSON.stringify(state)); };
      const format = number => new Intl.NumberFormat("ru-RU").format(number);
      function render() {
        balance.textContent = format(state.coins);
        perSecond.textContent = `+${state.upgrades.auto} TG/сек`;
        energyText.textContent = `${Math.floor(state.energy)}/${maxEnergy()}`;
        energyFill.style.width = `${Math.max(0, state.energy / maxEnergy() * 100)}%`;
        autoList.innerHTML = definitions.slice(0, 2).map((item, index) => `<article class="mini-upgrade"><span class="mini-icon">${index ? "▱" : "⌁"}</span><div><b>${item.name}</b><span>+${index ? state.upgrades.auto : clickIncome()} TG/мин</span></div></article>`).join("");
        upgrades.innerHTML = definitions.map(item => {
          const level = state.upgrades[item.id], cost = item.cost(level), affordable = state.coins >= cost;
          return `<article class="upgrade"><div><h3>${item.name}</h3><p>${item.description}</p><div class="level">Уровень ${level} · +TG COIN</div></div><button class="buy" data-upgrade="${item.id}" ${affordable ? "" : "disabled"}>Купить за ${format(cost)} TG</button></article>`;
        }).join("");
      }
      function showFloat(amount, event) {
        const rect = coinWrap.getBoundingClientRect();
        const x = event?.clientX ? event.clientX - rect.left : rect.width / 2;
        const y = event?.clientY ? event.clientY - rect.top : rect.height / 2;
        const node = document.createElement("span");
        node.className = "float"; node.textContent = `+${amount}`; node.style.left = `${x}px`; node.style.top = `${y}px`;
        coinWrap.append(node); node.addEventListener("animationend", () => node.remove());
      }
      coin.addEventListener("click", event => {
        if (state.energy < 1) {
          coin.classList.remove("empty"); void coin.offsetWidth; coin.classList.add("empty");
          return;
        }
        const income = clickIncome();
        state.energy -= 1; state.coins += income;
        coin.classList.add("pressed"); setTimeout(() => coin.classList.remove("pressed"), 100);
        if (navigator.vibrate) navigator.vibrate(10);
        showFloat(income, event); save(); render();
      });
      upgrades.addEventListener("click", event => {
        const button = event.target.closest(".buy:not(:disabled)");
        if (!button) return;
        const item = definitions.find(definition => definition.id === button.dataset.upgrade);
        const cost = item.cost(state.upgrades[item.id]);
        if (state.coins < cost) return;
        state.coins -= cost; state.upgrades[item.id] += 1;
        state.energy = Math.min(state.energy, maxEnergy());
        save(); render();
        const bought = upgrades.querySelector(`[data-upgrade="${item.id}"]`);
        bought.textContent = "Куплено!"; bought.classList.add("success");
        setTimeout(() => { if (bought.isConnected) { bought.textContent = "Купить"; bought.classList.remove("success"); } }, 200);
      });
      document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(element => element.classList.toggle("active", element === tab));
        document.querySelectorAll(".screen").forEach(screen => screen.classList.toggle("active", screen.dataset.screen === tab.dataset.tab));
      }));
      function tick() {
        const now = Date.now(); applyElapsed(now - lastTick); lastTick = now; save(); render();
      }
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) { const now = Date.now(); applyElapsed(now - lastTick); lastTick = now; save(); render(); }
      });
      window.addEventListener("beforeunload", save);
      render(); save(); setInterval(tick, 100);
    })();
  </script>
</body>
</html>
