<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>TG Coin — кликер</title>
  <style>
    :root {
      --bg: #f2f3f5;
      --white: #ffffff;
      --text: #000000;
      --muted: #818c99;
      --line: #e1e3e6;
      --blue: #4986cc;
      --blue-light: #6fa3dc;
      --blue-pill: rgba(255, 255, 255, .22);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0;
      background: var(--bg);
      user-select: none;
    }
    .app {
      position: relative;
      width: min(100%, 390px);
      height: 100vh;
      max-height: 844px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--white);
    }
    .balance-block {
      padding: 28px 20px 10px;
      text-align: center;
    }
    .account-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
    }
    .balance-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .balance {
      color: var(--text);
      font-size: 44px;
      font-weight: 500;
      letter-spacing: -.5px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .coin-badge {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 2.5px solid #2c2f33;
      border-radius: 50%;
      background: var(--white);
      color: #2c2f33;
    }
    .coin-badge svg { width: 15px; height: 15px; }
    .meta-row {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }
    .energy-track {
      width: 80px;
      height: 5px;
      overflow: hidden;
      border-radius: 99px;
      background: #e8eaed;
    }
    .energy-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
      transition: width .12s linear;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 16px 16px 8px;
    }
    .action {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      aspect-ratio: 1;
      border: 0;
      border-radius: 16px;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      transition: transform .1s ease;
    }
    .action:active { transform: scale(.96); }
    .action svg {
      width: 32px;
      height: 32px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .action.top { background: linear-gradient(145deg, #ffb347, #ff7a45); }
    .action.transfer { background: linear-gradient(145deg, #9b6dff, #6b3fd4); }
    .action.shop { background: linear-gradient(145deg, #ff6eb4, #e83296); }
    .home {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .section-title {
      margin: 12px 18px 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .auto-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 16px 10px;
      scrollbar-width: none;
    }
    .auto-list::-webkit-scrollbar { display: none; }
    .mini-card {
      flex: 0 0 175px;
      display: grid;
      grid-template-columns: 56px 1fr;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      background: var(--white);
    }
    .auto-empty {
      margin: 0;
      padding: 0 18px 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }
    .item-icon {
      position: relative;
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      border: 2px solid currentColor;
      border-radius: 12px;
      background: var(--white);
      flex-shrink: 0;
    }
    .item-icon svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .mini-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      padding: 1px 5px;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
    }
    .mini-card b {
      display: block;
      overflow: hidden;
      color: #2c2f33;
      font-size: 14px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-card span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }
    .coin-zone {
      position: relative;
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 24px;
      background: var(--white);
    }
    .coin-wrap {
      position: relative;
      display: grid;
      place-items: center;
      width: min(100%, 320px);
      height: min(100%, 320px);
      max-width: 300px;
      max-height: 300px;
    }
    .coin {
      position: relative;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      background: var(--blue);
      box-shadow: 0 8px 24px rgba(73, 134, 204, .35);
      transition: transform .1s ease, box-shadow .1s ease;
    }
    .coin::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, rgba(255,255,255,.18) 0%, transparent 55%);
      pointer-events: none;
    }
    .online {
      position: absolute;
      top: 18%;
      left: 50%;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--blue-pill);
      color: rgba(255, 255, 255, .92);
      font-size: 12px;
      font-weight: 600;
      transform: translateX(-50%);
      pointer-events: none;
      white-space: nowrap;
    }
    .online svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
    .pay-logo {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      pointer-events: none;
    }
    .pay-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255, 255, 255, .75);
      border-radius: 50%;
      color: rgba(255, 255, 255, .9);
    }
    .pay-mark svg { width: 18px; height: 18px; fill: currentColor; }
    .pay-text {
      color: rgba(200, 225, 255, .95);
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -.5px;
      text-transform: lowercase;
    }
    .coin:active, .coin.pressed {
      transform: scale(.94);
      box-shadow: 0 4px 16px rgba(73, 134, 204, .3);
    }
    .coin.empty { animation: shake .3s ease; }
    @keyframes shake {
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }
    .float {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      color: var(--blue);
      font-size: 22px;
      font-weight: 700;
      animation: rise .8s ease-out forwards;
    }
    @keyframes rise {
      from { opacity: 1; transform: translate(-50%, 0); }
      to { opacity: 0; transform: translate(-50%, -70px); }
    }
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: flex-end;
      background: rgba(0, 0, 0, .4);
    }
    .overlay.open { display: flex; }
    .sheet {
      width: 100%;
      max-height: 85%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 16px 16px 0 0;
      background: var(--white);
      animation: slideUp .2s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
    }
    .sheet-head h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }
    .sheet-close {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      background: #ebedf0;
      color: #818c99;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .sheet-body {
      overflow-y: auto;
      padding: 0 16px 28px;
    }
    .upgrade {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }
    .upgrade:last-child { border-bottom: 0; }
    .upgrade-info { min-width: 0; }
    .upgrade-title {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .upgrade-title h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .upgrade-title .yield {
      color: var(--blue);
      font-size: 14px;
      font-weight: 600;
    }
    .buy {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border: 0;
      border-radius: 20px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      transition: background .15s, transform .1s;
    }
    .buy:active { transform: scale(.97); }
    .buy:disabled { background: #c5ccd4; cursor: not-allowed; }
    .buy.success { background: #4caf50; }
    .buy .coin-badge {
      width: 18px;
      height: 18px;
      border-width: 1.5px;
    }
    .buy .coin-badge svg { width: 10px; height: 10px; }
    .panel-note {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    .profile-card {
      padding: 14px;
      margin-bottom: 14px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      background: #f7f8fa;
    }
    .profile-name { font-size: 18px; font-weight: 700; }
    .profile-id { margin-top: 4px; color: var(--blue); font-size: 13px; font-weight: 600; }
    .transfer-form { display: grid; gap: 12px; }
    label { color: var(--muted); font-size: 13px; font-weight: 600; }
    input {
      width: 100%;
      margin-top: 6px;
      padding: 12px 14px;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      outline: none;
      color: var(--text);
      font: inherit;
      font-size: 16px;
    }
    input:focus { border-color: var(--blue); }
    .primary {
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 16px;
      font-weight: 600;
    }
    .transfer-message { min-height: 18px; color: var(--blue); font-size: 13px; font-weight: 600; }
    .rating-row {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }
    .rating-row:last-child { border-bottom: 0; }
    .rating-row.you { background: #eef4fb; margin: 0 -16px; padding: 12px 16px; }
    .rank { color: var(--blue); font-size: 15px; font-weight: 700; }
    .rating-row b { font-size: 15px; font-weight: 600; }
    .rating-row span { color: var(--muted); font-size: 14px; font-weight: 600; }
    .modal {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, .45);
    }
    .modal[hidden] { display: none; }
    .modal-card {
      width: min(100%, 340px);
      padding: 24px;
      border-radius: 16px;
      background: var(--white);
    }
    .modal-card h1 {
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 700;
    }
    .modal-card p { margin: 0 0 16px; color: var(--muted); font-size: 14px; line-height: 1.45; }
    .modal-id {
      margin-bottom: 16px;
      padding: 12px;
      border: 2px dashed #a8c4e8;
      border-radius: 10px;
      color: var(--blue);
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }
    .c-orange { color: #f5a623; }
    .c-green { color: #4caf50; }
    .c-blue { color: #4986cc; }
    .c-pink { color: #e91e8c; }
    .c-purple { color: #7b4dff; }
    @media (min-width: 481px) {
      body { padding: 18px; }
      .app { height: min(844px, calc(100vh - 36px)); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,.12); }
    }
  </style>
</head>
<body>
  <section class="app" aria-label="TG Coin">
    <div class="balance-block">
      <div class="account-label">Ваш счёт</div>
      <div class="balance-row">
        <div class="balance" id="balance">0</div>
        <span class="coin-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M21.5 4.3c.3-.9-.6-1.6-1.4-1.2L2.7 10.3c-.9.4-.8 1.7.1 2l4.6 1.5 1.8 5.7c.3.9 1.5 1.1 2.1.3l2.7-3.4 4.9 3.6c.7.5 1.7.1 1.9-.7L21.5 4.3z" fill="currentColor"/></svg>
        </span>
      </div>
      <div class="meta-row">
        <span id="perSecond">+0/сек</span>
        <span>·</span>
        <span>Энергия <b id="energyText">100/100</b></span>
        <div class="energy-track"><div class="energy-fill" id="energyFill"></div></div>
      </div>
    </div>

    <div class="actions">
      <button class="action top" type="button" data-sheet="rating" aria-label="Топ">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>
        Топ
      </button>
      <button class="action transfer" type="button" data-sheet="transfer" aria-label="Перевести">
        <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="14" y1="15" x2="18" y2="15"/></svg>
        Перевести
      </button>
      <button class="action shop" type="button" data-sheet="shop" aria-label="Ускорения">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Ускорения
      </button>
    </div>

    <div class="home">
      <div class="section-title">Автоматически</div>
      <div class="auto-list" id="autoList"></div>
      <div class="coin-zone">
        <div class="coin-wrap" id="coinWrap">
          <button class="coin" id="coin" aria-label="Нажмите для получения монет">
            <span class="online" id="onlineBadge">
              <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              онлайн <span id="onlineCount">1</span>
            </span>
            <span class="pay-logo">
              <span class="pay-mark">
                <svg viewBox="0 0 24 24"><path d="M21.5 4.3c.3-.9-.6-1.6-1.4-1.2L2.7 10.3c-.9.4-.8 1.7.1 2l4.6 1.5 1.8 5.7c.3.9 1.5 1.1 2.1.3l2.7-3.4 4.9 3.6c.7.5 1.7.1 1.9-.7L21.5 4.3z"/></svg>
              </span>
              <span class="pay-text">pay</span>
            </span>
          </button>
        </div>
      </div>
    </div>

    <div class="overlay" id="overlay-shop" data-sheet-panel="shop">
      <div class="sheet">
        <div class="sheet-head">
          <h2>Ускорения</h2>
          <button class="sheet-close" type="button" data-close aria-label="Закрыть">×</button>
        </div>
        <div class="sheet-body" id="upgrades"></div>
      </div>
    </div>

    <div class="overlay" id="overlay-transfer" data-sheet-panel="transfer">
      <div class="sheet">
        <div class="sheet-head">
          <h2>Перевести</h2>
          <button class="sheet-close" type="button" data-close aria-label="Закрыть">×</button>
        </div>
        <div class="sheet-body">
          <p class="panel-note">Переводите TG Coin по уникальному ID игрока.</p>
          <div class="profile-card">
            <div class="profile-name" id="profileName">Игрок</div>
            <div class="profile-id" id="profileId">ID: —</div>
          </div>
          <form class="transfer-form" id="transferForm">
            <label>ID получателя<input id="recipientId" required placeholder="TG-12345678"></label>
            <label>Сумма<input id="transferAmount" required min="1" step="1" type="number" placeholder="0"></label>
            <button class="primary" type="submit">Отправить</button>
            <div class="transfer-message" id="transferMessage"></div>
          </form>
        </div>
      </div>
    </div>

    <div class="overlay" id="overlay-rating" data-sheet-panel="rating">
      <div class="sheet">
        <div class="sheet-head">
          <h2>Топ</h2>
          <button class="sheet-close" type="button" data-close aria-label="Закрыть">×</button>
        </div>
        <div class="sheet-body" id="ratingList"></div>
      </div>
    </div>

    <div class="modal" id="registration" hidden>
      <form class="modal-card" id="registrationForm">
        <h1>
          <span class="coin-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M21.5 4.3c.3-.9-.6-1.6-1.4-1.2L2.7 10.3c-.9.4-.8 1.7.1 2l4.6 1.5 1.8 5.7c.3.9 1.5 1.1 2.1.3l2.7-3.4 4.9 3.6c.7.5 1.7.1 1.9-.7L21.5 4.3z" fill="currentColor"/></svg>
          </span>
          TG Coin
        </h1>
        <p>Выберите имя. ID для переводов будет выдан автоматически.</p>
        <div class="modal-id" id="newProfileId"></div>
        <label>Ваше имя
          <input id="registrationName" required maxlength="20" placeholder="Например, Алексей" autocomplete="nickname">
        </label>
        <button class="primary" type="submit" style="width:100%;margin-top:16px">Начать играть</button>
      </form>
    </div>
  </section>

  <script>
    (() => {
      "use strict";
      const KEY = "tgCoinGameState";
      const ONLINE_KEY = "tgCoinOnlineSessions";
      const SESSION_TTL = 60000;
      const HEARTBEAT_MS = 10000;
      const sessionId = crypto.randomUUID?.() || `s-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const badge = '<span class="coin-badge" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M21.5 4.3c.3-.9-.6-1.6-1.4-1.2L2.7 10.3c-.9.4-.8 1.7.1 2l4.6 1.5 1.8 5.7c.3.9 1.5 1.1 2.1.3l2.7-3.4 4.9 3.6c.7.5 1.7.1 1.9-.7L21.5 4.3z" fill="currentColor"/></svg></span>';
      const icons = {
        cursor: '<svg viewBox="0 0 24 24"><path d="M4 4l7.07 16.97 2.51-7.39 7.39-2.51L4 4z"/><path d="M13 13l6 6"/></svg>',
        gpu: '<svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="2"/><path d="M8 10h2M14 10h2M8 14h8"/><path d="M2 10v4M22 10v4M10 2v2M14 2v2M10 20v2M14 20v2"/></svg>',
        rack: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="5" rx="1"/><rect x="3" y="10" width="18" height="5" rx="1"/><rect x="3" y="16" width="18" height="5" rx="1"/><circle cx="7" cy="6.5" r="1" fill="currentColor"/><circle cx="7" cy="12.5" r="1" fill="currentColor"/><circle cx="7" cy="18.5" r="1" fill="currentColor"/></svg>',
        server: '<svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="6" rx="1"/><rect x="4" y="11" width="16" height="6" rx="1"/><circle cx="8" cy="6" r="1" fill="currentColor"/><circle cx="8" cy="14" r="1" fill="currentColor"/><path d="M12 19v2M8 21h8"/></svg>'
      };
      const colors = ["c-orange", "c-green", "c-blue", "c-pink"];
      const definitions = [
        { id: "click", name: "Курсор", icon: "cursor", badge: level => level > 0 ? `x${level + 1}` : null, yield: level => `+${(0.001 * (1 + level)).toFixed(3)}/сек`, cost: level => Math.ceil(10 * 1.5 ** level) },
        { id: "auto", name: "Видеокарта", icon: "gpu", badge: null, yield: level => `+${level}/сек`, cost: level => Math.ceil(50 * 1.5 ** level) },
        { id: "tank", name: "Энергоблок", icon: "rack", badge: null, yield: level => `+${50 * level} макс.`, cost: level => 100 * (level + 1) },
        { id: "recovery", name: "Сервер", icon: "server", badge: null, yield: level => `+${(1 + .5 * level).toFixed(1)}/сек`, cost: level => 75 * (level + 1) }
      ];
      const initial = () => ({
        coins: 0, energy: 100,
        upgrades: { click: 0, auto: 0, tank: 0, recovery: 0 },
        autoCarry: 0, lastSeen: Date.now(), profile: null
      });

      let state;
      try {
        const saved = JSON.parse(localStorage.getItem(KEY));
        state = saved?.upgrades ? { ...initial(), ...saved, upgrades: { ...initial().upgrades, ...saved.upgrades } } : initial();
      } catch { state = initial(); }

      const maxEnergy = () => 100 + 50 * state.upgrades.tank;
      const recoveryRate = () => 1 + .5 * state.upgrades.recovery;
      const clickIncome = () => 1 + state.upgrades.click;
      const applyElapsed = ms => {
        const sec = Math.max(0, ms / 1000);
        state.energy = Math.min(maxEnergy(), state.energy + sec * recoveryRate());
        const passive = state.autoCarry + sec * state.upgrades.auto;
        const earned = Math.floor(passive);
        state.coins += earned;
        state.autoCarry = passive - earned;
      };
      applyElapsed(Date.now() - state.lastSeen);
      let lastTick = Date.now();

      const $ = s => document.querySelector(s);
      const $$ = s => [...document.querySelectorAll(s)];
      const balance = $("#balance"), perSecond = $("#perSecond"), energyText = $("#energyText");
      const energyFill = $("#energyFill"), coin = $("#coin"), coinWrap = $("#coinWrap");
      const upgrades = $("#upgrades"), autoList = $("#autoList");
      const profileName = $("#profileName"), profileId = $("#profileId"), ratingList = $("#ratingList");
      const onlineCount = $("#onlineCount");

      const save = () => { state.lastSeen = Date.now(); localStorage.setItem(KEY, JSON.stringify(state)); };
      const format = n => new Intl.NumberFormat("ru-RU").format(n);
      const esc = v => String(v).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]);
      const createId = () => `TG-${Math.floor(10000000 + Math.random() * 90000000)}`;
      const formatOnline = n => n >= 1000 ? `${(n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(".0", "")}K` : String(n);
      const renderItemIcon = (item, index, level) => {
        const badge = item.badge?.(level);
        return `<span class="item-icon ${colors[index]}">${icons[item.icon]}${badge ? `<span class="mini-badge">${badge}</span>` : ""}</span>`;
      };
      const firstNames = ["Crypto", "Blue", "Fast", "Gold", "Lucky", "Dark", "Neo", "Mega", "Pro", "Super", "Iron", "Fire", "Ice", "Moon", "Star"];
      const lastNames = ["Fox", "Wolf", "Tiger", "Miner", "Clicker", "Coin", "Trader", "Boss", "King", "Hawk", "Bear", "Dragon", "Ninja", "Pilot", "Lord"];
      const npcName = index => `${firstNames[index % firstNames.length]} ${lastNames[Math.floor(index / firstNames.length) % lastNames.length]}`;
      const npcCoins = index => Math.max(120, Math.floor(98500 - index * 920 + ((index * 37) % 400)));
      const ranking = () => {
        const players = Array.from({ length: 99 }, (_, index) => ({
          name: npcName(index),
          coins: npcCoins(index)
        }));
        players.push({ name: state.profile?.name || "Вы", coins: state.coins, you: true });
        return players.sort((a, b) => b.coins - a.coins).slice(0, 100);
      };
      const readSessions = () => {
        try { return JSON.parse(localStorage.getItem(ONLINE_KEY) || "{}"); }
        catch { return {}; }
      };
      const writeSessions = sessions => localStorage.setItem(ONLINE_KEY, JSON.stringify(sessions));
      const pruneSessions = sessions => {
        const now = Date.now();
        Object.keys(sessions).forEach(id => {
          if (now - sessions[id] > SESSION_TTL) delete sessions[id];
        });
        return sessions;
      };
      const updateOnline = () => {
        const sessions = pruneSessions(readSessions());
        sessions[sessionId] = Date.now();
        writeSessions(sessions);
        onlineCount.textContent = formatOnline(Object.keys(sessions).length);
        return Object.keys(sessions).length;
      };

      const openSheet = name => $$(".overlay").forEach(o => o.classList.toggle("open", o.dataset.sheetPanel === name));
      const closeSheets = () => $$(".overlay").forEach(o => o.classList.remove("open"));

      function render() {
        balance.textContent = format(state.coins);
        perSecond.textContent = `+${state.upgrades.auto}/сек`;
        energyText.textContent = `${Math.floor(state.energy)}/${maxEnergy()}`;
        energyFill.style.width = `${Math.max(0, state.energy / maxEnergy() * 100)}%`;
        if (state.profile) {
          profileName.textContent = state.profile.name;
          profileId.textContent = `ID: ${state.profile.id}`;
        }

        ratingList.innerHTML = ranking().map((p, i) => `
          <div class="rating-row${p.you ? " you" : ""}">
            <div class="rank">#${i + 1}</div>
            <b>${esc(p.name)}${p.you ? " · вы" : ""}</b>
            <span>${format(p.coins)}</span>
          </div>`).join("");

        const purchased = definitions
          .map((item, index) => ({ item, index, level: state.upgrades[item.id] }))
          .filter(entry => entry.level > 0);
        autoList.innerHTML = purchased.length
          ? purchased.map(({ item, index, level }) => `<article class="mini-card">
              ${renderItemIcon(item, index, level)}
              <div><b>${item.name}</b><span>${item.yield(level)}</span></div>
            </article>`).join("")
          : '<p class="auto-empty">Купите ускорения, чтобы они появились здесь</p>';

        upgrades.innerHTML = definitions.map((item, i) => {
          const lvl = state.upgrades[item.id];
          const cost = item.cost(lvl);
          return `<article class="upgrade">
            ${renderItemIcon(item, i, lvl)}
            <div class="upgrade-info">
              <div class="upgrade-title"><h3>${item.name}</h3><span class="yield">${item.yield(lvl)}</span></div>
              <button class="buy" data-upgrade="${item.id}" ${state.coins >= cost ? "" : "disabled"}>
                Купить за ${format(cost)} ${badge}
              </button>
            </div>
          </article>`;
        }).join("");
      }

      function showFloat(amount, e) {
        const r = coinWrap.getBoundingClientRect();
        const el = document.createElement("span");
        el.className = "float";
        el.textContent = `+${amount}`;
        el.style.left = `${(e?.clientX ?? r.left + r.width / 2) - r.left}px`;
        el.style.top = `${(e?.clientY ?? r.top + r.height / 2) - r.top}px`;
        coinWrap.append(el);
        el.addEventListener("animationend", () => el.remove());
      }

      coin.addEventListener("click", e => {
        if (state.energy < 1) {
          coin.classList.remove("empty"); void coin.offsetWidth; coin.classList.add("empty");
          return;
        }
        const income = clickIncome();
        state.energy -= 1;
        state.coins += income;
        coin.classList.add("pressed");
        setTimeout(() => coin.classList.remove("pressed"), 100);
        if (navigator.vibrate) navigator.vibrate(10);
        showFloat(income, e);
        save(); render();
      });

      upgrades.addEventListener("click", e => {
        const btn = e.target.closest(".buy:not(:disabled)");
        if (!btn) return;
        const item = definitions.find(d => d.id === btn.dataset.upgrade);
        const cost = item.cost(state.upgrades[item.id]);
        if (state.coins < cost) return;
        state.coins -= cost;
        state.upgrades[item.id]++;
        state.energy = Math.min(state.energy, maxEnergy());
        save(); render();
        const bought = upgrades.querySelector(`[data-upgrade="${item.id}"]`);
        bought.textContent = "Куплено!";
        bought.classList.add("success");
        setTimeout(() => { bought.classList.remove("success"); render(); }, 200);
      });

      $$("[data-sheet]").forEach(b => b.addEventListener("click", () => openSheet(b.dataset.sheet)));
      $$("[data-close]").forEach(b => b.addEventListener("click", closeSheets));
      $$(".overlay").forEach(o => o.addEventListener("click", e => { if (e.target === o) closeSheets(); }));

      if (!state.profile) {
        const id = createId();
        $("#newProfileId").textContent = `Ваш ID: ${id}`;
        $("#registration").hidden = false;
        $("#registrationForm").addEventListener("submit", e => {
          e.preventDefault();
          state.profile = { id, name: $("#registrationName").value.trim() || "Игрок" };
          $("#registration").hidden = true;
          save(); render();
        });
      }

      $("#transferForm").addEventListener("submit", e => {
        e.preventDefault();
        const recipient = $("#recipientId").value.trim().toUpperCase();
        const amount = Number($("#transferAmount").value);
        const msg = $("#transferMessage");
        if (!/^TG-\d{8}$/.test(recipient)) { msg.textContent = "ID в формате TG-12345678"; return; }
        if (!Number.isInteger(amount) || amount < 1) { msg.textContent = "Укажите целое число"; return; }
        if (amount > state.coins) { msg.textContent = "Недостаточно монет"; return; }
        state.coins -= amount;
        save(); render();
        msg.textContent = `Отправлено ${format(amount)} на ${recipient}`;
        e.target.reset();
      });

      const tick = () => { const now = Date.now(); applyElapsed(now - lastTick); lastTick = now; save(); render(); };
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) { const now = Date.now(); applyElapsed(now - lastTick); lastTick = now; save(); render(); }
      });
      window.addEventListener("beforeunload", () => {
        const sessions = pruneSessions(readSessions());
        delete sessions[sessionId];
        writeSessions(sessions);
        save();
      });
      window.addEventListener("storage", event => {
        if (event.key === ONLINE_KEY) updateOnline();
      });
      updateOnline();
      setInterval(updateOnline, HEARTBEAT_MS);
      render(); save(); setInterval(tick, 100);
    })();
  </script>
</body>
</html>
