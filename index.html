<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>TG Coin — кликер</title>
  <style>
    :root {
      --bg: #f2f3f5;
      --panel: #ffffff;
      --text: #222222;
      --muted: #818c99;
      --line: #dce1e6;
      --line-strong: #c5ccd3;
      --blue: #4986cc;
      --blue-dark: #3a6fad;
      --blue-soft: #e8f1fa;
      --shadow: 0 8px 24px rgba(0, 0, 0, .08);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #dfe3e8;
      user-select: none;
    }
    .phone {
      position: relative;
      width: min(100%, 390px);
      height: min(844px, calc(100vh - 36px));
      min-height: 640px;
      overflow: hidden;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 24px 60px rgba(20, 30, 45, .22);
    }
    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px 0;
      font-size: 12px;
      font-weight: 700;
    }
    .status-right { letter-spacing: 1px; }
    .chrome {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 10px 14px 0;
    }
    .chrome button {
      width: 36px;
      height: 28px;
      border: 0;
      border-radius: 14px;
      background: #ebedf0;
      color: #6d7885;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    .balance-block {
      padding: 18px 20px 8px;
      text-align: center;
    }
    .account-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
    }
    .balance-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .balance {
      color: #000;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -.8px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .tg-badge {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 2.5px solid #2a2f36;
      border-radius: 50%;
      background: #fff;
      color: #2a2f36;
    }
    .tg-badge svg { width: 14px; height: 14px; }
    .meta-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    .energy-track {
      width: 88px;
      height: 6px;
      overflow: hidden;
      border-radius: 99px;
      background: #e1e5ea;
    }
    .energy-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #6db3f2, #4986cc);
      transition: width .12s linear;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px 16px 6px;
    }
    .action {
      display: grid;
      place-items: center;
      gap: 8px;
      min-height: 92px;
      padding: 14px 8px 12px;
      border: 0;
      border-radius: 16px;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 6px 14px rgba(0, 0, 0, .12);
      transition: transform .12s ease, filter .12s ease;
    }
    .action:active { transform: scale(.97); }
    .action svg { width: 28px; height: 28px; stroke: #fff; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .action.top { background: linear-gradient(160deg, #ffb36a 0%, #ff7a45 55%, #ff5c3a 100%); }
    .action.transfer { background: linear-gradient(160deg, #a978ff 0%, #7b4dff 55%, #5f35e8 100%); }
    .action.shop { background: linear-gradient(160deg, #ff7fc4 0%, #f24aa4 55%, #e2318f 100%); }
    .home {
      display: flex;
      flex-direction: column;
      height: calc(100% - 250px);
      min-height: 0;
    }
    .section-title {
      margin: 14px 18px 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .7px;
      text-transform: uppercase;
    }
    .auto-list {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 16px 8px;
      scrollbar-width: none;
    }
    .auto-list::-webkit-scrollbar { display: none; }
    .mini-card {
      flex: 0 0 168px;
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 2px solid var(--line);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .03);
    }
    .mini-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 2px solid currentColor;
      border-radius: 12px;
      background: #fafbfc;
    }
    .mini-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
    .mini-card b {
      display: block;
      overflow: hidden;
      color: #3f4750;
      font-size: 13px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    .coin-zone {
      position: relative;
      flex: 1;
      display: grid;
      place-items: start center;
      padding-top: 18px;
      background:
        radial-gradient(circle at 50% 18%, rgba(73, 134, 204, .08), transparent 42%),
        linear-gradient(#fff 0%, #f7f9fc 100%);
    }
    .online {
      position: absolute;
      top: 34px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .22);
      color: rgba(255, 255, 255, .95);
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(2px);
      pointer-events: none;
    }
    .online svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; }
    .coin-wrap {
      position: relative;
      display: grid;
      place-items: center;
      width: 290px;
      height: 290px;
      margin-top: 8px;
    }
    .coin {
      position: relative;
      width: 248px;
      height: 248px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      background: radial-gradient(circle at 35% 28%, #7eb6f5 0%, #5a97de 38%, #4986cc 70%, #3a74b8 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, .35),
        inset 0 -10px 18px rgba(24, 74, 140, .28),
        0 14px 0 #376fac,
        0 22px 28px rgba(55, 111, 172, .28);
      transition: transform .1s ease, filter .1s ease;
    }
    .coin::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 3px solid rgba(255, 255, 255, .18);
      border-radius: 50%;
    }
    .coin-logo {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(232, 243, 255, .95);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.5px;
      text-shadow: 0 2px 0 rgba(28, 74, 140, .35);
    }
    .coin-logo .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 2.5px solid rgba(232, 243, 255, .9);
      border-radius: 50%;
    }
    .coin-logo .mark svg { width: 18px; height: 18px; }
    .coin:active, .coin.pressed { transform: scale(.92) translateY(4px); box-shadow: inset 0 2px 0 rgba(255,255,255,.35), inset 0 -8px 14px rgba(24,74,140,.28), 0 8px 0 #376fac, 0 12px 18px rgba(55,111,172,.25); }
    .coin.empty { animation: empty .28s linear; }
    @keyframes empty {
      25%, 75% { filter: saturate(1.4) hue-rotate(-20deg); transform: translateX(-4px); }
      50% { transform: translateX(4px); }
    }
    .float {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      color: #4986cc;
      font-size: 24px;
      font-weight: 800;
      text-shadow: 0 2px 0 #fff;
      animation: rise .8s ease-out forwards;
    }
    @keyframes rise {
      from { opacity: 1; transform: translate(-50%, 0) scale(.92); }
      to { opacity: 0; transform: translate(-50%, -78px) scale(1.1); }
    }
    .sheet {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: flex-end;
      background: rgba(0, 0, 0, .35);
    }
    .sheet.open { display: flex; }
    .sheet-card {
      width: 100%;
      max-height: 78%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 18px 18px 0 0;
      background: #fff;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, .16);
      animation: slideUp .22s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(24px); opacity: .7; }
      to { transform: translateY(0); opacity: 1; }
    }
    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 18px 10px;
      border-bottom: 2px solid #eef1f4;
    }
    .sheet-head h2 {
      margin: 0;
      font-size: 21px;
      font-weight: 800;
    }
    .sheet-close {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 50%;
      background: #ebedf0;
      color: #6d7885;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .sheet-body {
      overflow-y: auto;
      padding: 8px 16px 22px;
    }
    .upgrade {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 2px solid #eef1f4;
    }
    .upgrade:last-child { border-bottom: 0; }
    .upgrade-icon {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border: 2.5px solid currentColor;
      border-radius: 14px;
      background: #fafbfc;
    }
    .upgrade-icon svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
    .upgrade h3 {
      margin: 0 0 4px;
      color: #2c333a;
      font-size: 15px;
      font-weight: 700;
    }
    .upgrade .yield {
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
    }
    .upgrade p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .buy {
      min-width: 118px;
      padding: 10px 12px;
      border: 0;
      border-radius: 18px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 4px 10px rgba(73, 134, 204, .25);
      transition: background .15s, transform .15s;
    }
    .buy:active { transform: scale(.96); }
    .buy:disabled { background: #c5ccd4; box-shadow: none; cursor: not-allowed; }
    .buy.success { background: #4bb36a; }
    .panel-note {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .profile-card, .transfer-form, .rating-list {
      border: 2px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }
    .profile-card {
      padding: 16px;
      margin-bottom: 12px;
      background: linear-gradient(160deg, #eef5fc, #fff);
    }
    .profile-name { font-size: 20px; font-weight: 800; }
    .profile-id { margin-top: 6px; color: var(--blue); font-size: 13px; font-weight: 700; }
    .transfer-form { display: grid; gap: 12px; padding: 14px; }
    label { color: #667482; font-size: 12px; font-weight: 700; }
    input {
      width: 100%;
      margin-top: 6px;
      padding: 12px 14px;
      border: 2px solid var(--line-strong);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      font: inherit;
      font-size: 15px;
      font-weight: 600;
    }
    input:focus { border-color: var(--blue); }
    .primary {
      padding: 13px;
      border: 0;
      border-radius: 14px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 15px;
      font-weight: 800;
    }
    .transfer-message { min-height: 18px; color: var(--blue); font-size: 12px; font-weight: 700; }
    .rating-row {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 14px 14px;
      border-bottom: 2px solid #eef1f4;
    }
    .rating-row:last-child { border-bottom: 0; }
    .rating-row.you { background: var(--blue-soft); }
    .rank { color: var(--blue); font-size: 16px; font-weight: 800; }
    .rating-row b { font-size: 14px; }
    .rating-row span { color: #667482; font-size: 13px; font-weight: 700; }
    .modal {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(20, 30, 45, .48);
    }
    .modal[hidden] { display: none; }
    .modal-card {
      width: min(100%, 340px);
      padding: 24px 22px;
      border-radius: 20px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .modal-card h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 26px;
      font-weight: 800;
    }
    .modal-card p { color: var(--muted); font-size: 14px; line-height: 1.45; }
    .modal-id {
      margin: 14px 0;
      padding: 12px;
      border: 2.5px dashed #8eb5de;
      border-radius: 12px;
      color: var(--blue);
      font-size: 16px;
      font-weight: 800;
      text-align: center;
    }
    .color-orange { color: #ff7a3d; }
    .color-green { color: #3cb371; }
    .color-blue { color: #4986cc; }
    .color-pink { color: #e84f9a; }
    .color-purple { color: #7b4dff; }
    @media (max-width: 480px) {
      body { display: block; padding: 0; background: #fff; }
      .phone { width: 100%; height: 100vh; min-height: 100vh; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <section class="phone" aria-label="Игра TG Coin">
    <div class="status">
      <span>▮▮▮ ◉</span>
      <span>12:30</span>
      <span class="status-right">◉ ▰</span>
    </div>
    <div class="chrome">
      <button type="button" aria-label="Ещё">⋯</button>
      <button type="button" aria-label="Закрыть">✕</button>
    </div>

    <div class="balance-block">
      <div class="account-label">Ваш счёт</div>
      <div class="balance-row">
        <div class="balance" id="balance">0</div>
        <span class="tg-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M3.5 11.8l16.2-6.3c.7-.3 1.4.4 1.1 1.1L15 20.2c-.2.6-1 .7-1.4.2l-3.4-4.1-3.1 2.3c-.5.4-1.2.1-1.3-.5L3.5 11.8z" fill="currentColor" stroke="none"/><path d="M10.3 16.2L9.7 20.4c-.1.6.7.9 1.1.4l2.1-2.4" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
        </span>
      </div>
      <div class="meta-row">
        <span id="perSecond">+0/сек</span>
        <span>·</span>
        <span>Энергия <b id="energyText">100/100</b></span>
        <div class="energy-track"><div class="energy-fill" id="energyFill"></div></div>
      </div>
    </div>

    <div class="actions">
      <button class="action top" type="button" data-sheet="rating">
        <svg viewBox="0 0 24 24"><path d="M12 3.5l2.4 4.9 5.4.8-3.9 3.8.9 5.4L12 15.8 7.2 18.4l.9-5.4L4.2 9.2l5.4-.8z"/></svg>
        Топ
      </button>
      <button class="action transfer" type="button" data-sheet="transfer">
        <svg viewBox="0 0 24 24"><rect x="3.5" y="6.5" width="17" height="11" rx="2.5"/><path d="M3.5 10.5h17"/><path d="M14.5 14.5h3"/><path d="M8 17.5l-2.5 2.5M5.5 20h4"/></svg>
        Перевести
      </button>
      <button class="action shop" type="button" data-sheet="shop">
        <svg viewBox="0 0 24 24"><path d="M7 8V7a5 5 0 0 1 10 0v1"/><path d="M5.5 8.5h13l-1.1 11.2a2 2 0 0 1-2 1.8H8.6a2 2 0 0 1-2-1.8L5.5 8.5z"/></svg>
        Ускорения
      </button>
    </div>

    <div class="home">
      <div class="section-title">Автоматически</div>
      <div class="auto-list" id="autoList"></div>
      <div class="coin-zone">
        <div class="coin-wrap" id="coinWrap">
          <button class="coin" id="coin" aria-label="Получить TG Coin">
            <span class="online">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.2"/><path d="M5.5 19c1.6-3.2 4-4.8 6.5-4.8S17 15.8 18.5 19"/></svg>
              онлайн 150K
            </span>
            <span class="coin-logo">
              <span class="mark">
                <svg viewBox="0 0 24 24"><path d="M3.5 11.8l16.2-6.3c.7-.3 1.4.4 1.1 1.1L15 20.2c-.2.6-1 .7-1.4.2l-3.4-4.1-3.1 2.3c-.5.4-1.2.1-1.3-.5L3.5 11.8z" fill="currentColor" stroke="none"/></svg>
              </span>
              TG PAY
            </span>
          </button>
        </div>
      </div>
    </div>

    <div class="sheet" id="sheet-shop" data-sheet-panel="shop">
      <div class="sheet-card">
        <div class="sheet-head">
          <h2>Ускорения</h2>
          <button class="sheet-close" type="button" data-close>×</button>
        </div>
        <div class="sheet-body" id="upgrades"></div>
      </div>
    </div>

    <div class="sheet" id="sheet-transfer" data-sheet-panel="transfer">
      <div class="sheet-card">
        <div class="sheet-head">
          <h2>Перевести</h2>
          <button class="sheet-close" type="button" data-close>×</button>
        </div>
        <div class="sheet-body">
          <p class="panel-note">Отправляйте TG Coin по уникальному ID. Ваш ID показывается ниже.</p>
          <div class="profile-card">
            <div class="profile-name" id="profileName">Игрок</div>
            <div class="profile-id" id="profileId">ID: —</div>
          </div>
          <form class="transfer-form" id="transferForm">
            <label>ID получателя<input id="recipientId" required placeholder="TG-12345678"></label>
            <label>Сумма<input id="transferAmount" required min="1" step="1" type="number" placeholder="0"></label>
            <button class="primary" type="submit">Отправить TG Coin</button>
            <div class="transfer-message" id="transferMessage"></div>
          </form>
        </div>
      </div>
    </div>

    <div class="sheet" id="sheet-rating" data-sheet-panel="rating">
      <div class="sheet-card">
        <div class="sheet-head">
          <h2>Топ</h2>
          <button class="sheet-close" type="button" data-close>×</button>
        </div>
        <div class="sheet-body">
          <p class="panel-note">Рейтинг игроков по балансу TG Coin.</p>
          <div class="rating-list" id="ratingList"></div>
        </div>
      </div>
    </div>

    <div class="modal" id="registration" hidden>
      <form class="modal-card" id="registrationForm">
        <h1>
          <span class="tg-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3.5 11.8l16.2-6.3c.7-.3 1.4.4 1.1 1.1L15 20.2c-.2.6-1 .7-1.4.2l-3.4-4.1-3.1 2.3c-.5.4-1.2.1-1.3-.5L3.5 11.8z" fill="currentColor" stroke="none"/></svg>
          </span>
          TG Coin
        </h1>
        <p>Мини-регистрация: выберите имя, а ID для переводов выдаётся автоматически.</p>
        <div class="modal-id" id="newProfileId"></div>
        <label>Ваше имя
          <input id="registrationName" required maxlength="20" placeholder="Например, Алексей" autocomplete="nickname">
        </label>
        <p style="margin-bottom:0"><button class="primary" type="submit">Начать играть</button></p>
      </form>
    </div>
  </section>

  <script>
    (() => {
      "use strict";
      const KEY = "tgCoinGameState";
      const icons = {
        cursor: '<svg viewBox="0 0 24 24"><path d="M6 4l10 7-4.4 1.3L14 18z"/></svg>',
        auto: '<svg viewBox="0 0 24 24"><rect x="4" y="7" width="16" height="10" rx="2"/><path d="M8 17v2M16 17v2M9 11h2M13 11h2"/></svg>',
        tank: '<svg viewBox="0 0 24 24"><rect x="7" y="5" width="10" height="15" rx="2"/><path d="M10 2h4M9 10h6M9 14h6"/></svg>',
        recovery: '<svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.3-5.6"/><path d="M20 4v4h-4"/></svg>'
      };
      const colors = ["color-orange", "color-green", "color-blue", "color-pink"];
      const definitions = [
        { id: "click", name: "Усилитель клика", description: "Увеличивает доход от каждого нажатия на +1.", icon: "cursor", yield: level => `+${1 + level}/клик`, cost: level => Math.ceil(10 * 1.5 ** level) },
        { id: "auto", name: "Автоклик", description: "Даёт +1 монету в секунду за каждый уровень.", icon: "auto", yield: level => `+${level}/сек`, cost: level => Math.ceil(50 * 1.5 ** level) },
        { id: "tank", name: "Бак энергии", description: "Увеличивает максимальную энергию на 50.", icon: "tank", yield: level => `+${50 * level} макс.`, cost: level => 100 * (level + 1) },
        { id: "recovery", name: "Скорость восстановления", description: "Увеличивает восстановление энергии на 0,5/сек.", icon: "recovery", yield: level => `+${(1 + .5 * level).toFixed(1)}/сек`, cost: level => 75 * (level + 1) }
      ];
      const initial = () => ({
        coins: 0,
        energy: 100,
        upgrades: { click: 0, auto: 0, tank: 0, recovery: 0 },
        autoCarry: 0,
        lastSeen: Date.now(),
        profile: null
      });
      let state;
      try {
        const saved = JSON.parse(localStorage.getItem(KEY));
        state = saved && saved.upgrades
          ? { ...initial(), ...saved, upgrades: { ...initial().upgrades, ...saved.upgrades } }
          : initial();
      } catch {
        state = initial();
      }

      const maxEnergy = () => 100 + 50 * state.upgrades.tank;
      const recoveryRate = () => 1 + .5 * state.upgrades.recovery;
      const clickIncome = () => 1 + state.upgrades.click;
      const applyElapsed = (ms) => {
        const seconds = Math.max(0, ms / 1000);
        state.energy = Math.min(maxEnergy(), state.energy + seconds * recoveryRate());
        const passive = state.autoCarry + seconds * state.upgrades.auto;
        const earned = Math.floor(passive);
        state.coins += earned;
        state.autoCarry = passive - earned;
      };
      applyElapsed(Date.now() - state.lastSeen);
      let lastTick = Date.now();

      const $ = selector => document.querySelector(selector);
      const $$ = selector => [...document.querySelectorAll(selector)];
      const balance = $("#balance");
      const perSecond = $("#perSecond");
      const energyText = $("#energyText");
      const energyFill = $("#energyFill");
      const coin = $("#coin");
      const coinWrap = $("#coinWrap");
      const upgrades = $("#upgrades");
      const autoList = $("#autoList");
      const profileName = $("#profileName");
      const profileId = $("#profileId");
      const ratingList = $("#ratingList");

      const save = () => {
        state.lastSeen = Date.now();
        localStorage.setItem(KEY, JSON.stringify(state));
      };
      const format = number => new Intl.NumberFormat("ru-RU").format(number);
      const escapeHtml = value => String(value).replace(/[&<>"']/g, character => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      })[character]);
      const createId = () => `TG-${String(Math.floor(10000000 + Math.random() * 90000000))}`;
      const ranking = () => {
        const players = [
          { name: "Crypto Fox", coins: 48250 },
          { name: "TG Master", coins: 31400 },
          { name: "Coin Runner", coins: 18750 },
          { name: "Blue Whale", coins: 10200 },
          { name: state.profile?.name || "Вы", coins: state.coins, you: true }
        ];
        return players.sort((a, b) => b.coins - a.coins);
      };

      const openSheet = name => {
        $$(".sheet").forEach(sheet => sheet.classList.toggle("open", sheet.dataset.sheetPanel === name));
      };
      const closeSheets = () => $$(".sheet").forEach(sheet => sheet.classList.remove("open"));

      function render() {
        balance.textContent = format(state.coins);
        perSecond.textContent = `+${state.upgrades.auto}/сек`;
        energyText.textContent = `${Math.floor(state.energy)}/${maxEnergy()}`;
        energyFill.style.width = `${Math.max(0, state.energy / maxEnergy() * 100)}%`;

        if (state.profile) {
          profileName.textContent = state.profile.name;
          profileId.textContent = `ID для переводов: ${state.profile.id}`;
        }

        ratingList.innerHTML = ranking().map((player, index) => `
          <div class="rating-row${player.you ? " you" : ""}">
            <div class="rank">#${index + 1}</div>
            <b>${escapeHtml(player.name)}${player.you ? " · вы" : ""}</b>
            <span>${format(player.coins)} TG</span>
          </div>
        `).join("");

        autoList.innerHTML = definitions.map((item, index) => {
          const level = state.upgrades[item.id];
          return `
            <article class="mini-card">
              <span class="mini-icon ${colors[index]}">${icons[item.icon]}</span>
              <div>
                <b>${item.name}</b>
                <span>${item.yield(level)}</span>
              </div>
            </article>
          `;
        }).join("");

        upgrades.innerHTML = definitions.map((item, index) => {
          const level = state.upgrades[item.id];
          const cost = item.cost(level);
          const affordable = state.coins >= cost;
          return `
            <article class="upgrade">
              <span class="upgrade-icon ${colors[index]}">${icons[item.icon]}</span>
              <div>
                <h3>${item.name}</h3>
                <div class="yield">${item.yield(level)} · ур. ${level}</div>
                <p>${item.description}</p>
              </div>
              <button class="buy" data-upgrade="${item.id}" ${affordable ? "" : "disabled"}>
                Купить за ${format(cost)} TG
              </button>
            </article>
          `;
        }).join("");
      }

      function showFloat(amount, event) {
        const rect = coinWrap.getBoundingClientRect();
        const x = event?.clientX ? event.clientX - rect.left : rect.width / 2;
        const y = event?.clientY ? event.clientY - rect.top : rect.height / 2;
        const node = document.createElement("span");
        node.className = "float";
        node.textContent = `+${amount}`;
        node.style.left = `${x}px`;
        node.style.top = `${y}px`;
        coinWrap.append(node);
        node.addEventListener("animationend", () => node.remove());
      }

      coin.addEventListener("click", event => {
        if (state.energy < 1) {
          coin.classList.remove("empty");
          void coin.offsetWidth;
          coin.classList.add("empty");
          return;
        }
        const income = clickIncome();
        state.energy -= 1;
        state.coins += income;
        coin.classList.add("pressed");
        setTimeout(() => coin.classList.remove("pressed"), 100);
        if (navigator.vibrate) navigator.vibrate(10);
        showFloat(income, event);
        save();
        render();
      });

      upgrades.addEventListener("click", event => {
        const button = event.target.closest(".buy:not(:disabled)");
        if (!button) return;
        const item = definitions.find(definition => definition.id === button.dataset.upgrade);
        const cost = item.cost(state.upgrades[item.id]);
        if (state.coins < cost) return;
        state.coins -= cost;
        state.upgrades[item.id] += 1;
        state.energy = Math.min(state.energy, maxEnergy());
        save();
        render();
        const bought = upgrades.querySelector(`[data-upgrade="${item.id}"]`);
        bought.textContent = "Куплено!";
        bought.classList.add("success");
        setTimeout(() => {
          if (bought.isConnected) {
            bought.classList.remove("success");
            render();
          }
        }, 200);
      });

      $$("[data-sheet]").forEach(button => {
        button.addEventListener("click", () => openSheet(button.dataset.sheet));
      });
      $$("[data-close]").forEach(button => {
        button.addEventListener("click", closeSheets);
      });
      $$(".sheet").forEach(sheet => {
        sheet.addEventListener("click", event => {
          if (event.target === sheet) closeSheets();
        });
      });

      const registration = $("#registration");
      const registrationForm = $("#registrationForm");
      const registrationName = $("#registrationName");
      const newProfileId = $("#newProfileId");
      if (!state.profile) {
        const id = createId();
        newProfileId.textContent = `Ваш ID: ${id}`;
        registration.hidden = false;
        registrationForm.addEventListener("submit", event => {
          event.preventDefault();
          state.profile = { id, name: registrationName.value.trim() || "Игрок TG" };
          registration.hidden = true;
          save();
          render();
        });
      }

      $("#transferForm").addEventListener("submit", event => {
        event.preventDefault();
        const recipient = $("#recipientId").value.trim().toUpperCase();
        const amount = Number($("#transferAmount").value);
        const message = $("#transferMessage");
        if (!/^TG-\d{8}$/.test(recipient)) {
          message.textContent = "Введите корректный ID в формате TG-12345678.";
          return;
        }
        if (!Number.isInteger(amount) || amount < 1) {
          message.textContent = "Укажите целое число монет.";
          return;
        }
        if (amount > state.coins) {
          message.textContent = "Недостаточно TG Coin на балансе.";
          return;
        }
        state.coins -= amount;
        save();
        render();
        message.textContent = `${format(amount)} TG Coin отправлено на ${recipient}.`;
        event.target.reset();
      });

      function tick() {
        const now = Date.now();
        applyElapsed(now - lastTick);
        lastTick = now;
        save();
        render();
      }
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          const now = Date.now();
          applyElapsed(now - lastTick);
          lastTick = now;
          save();
          render();
        }
      });
      window.addEventListener("beforeunload", save);
      render();
      save();
      setInterval(tick, 100);
    })();
  </script>
</body>
</html>
